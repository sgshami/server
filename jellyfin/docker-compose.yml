version: '3.8'
services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    networks:
      - reverse-proxy
    ports:
      - 8096:8096
    volumes:
      - /mnt/nas/Movies:/media1:ro
      - /mnt/nas/TV Shows:/media2:ro
      - /mnt/drive1/jellyfin/Config:/config
      - /mnt/drive1/jellyfin/Cache:/cache
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: 'unless-stopped'

# networks:
#   reverse-proxy:
#     external: true
