events { }

http {

  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

  server {
    listen 80;
    server_name www.sgshami.com;
    return 301 https://www.sgshami.com$request_uri;
         }

   server {
    listen 443 ssl;
    server_name www.sgshami.com;
    
    ssl_certificate /ssl/sgshami_com.crt;
    ssl_certificate_key /ssl/sgshami_com.key;
    
    access_log /var/log/nginx/data-access.log combined;

    location / {
       root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
       }
   }
}