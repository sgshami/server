version: '3.8'

services:
  nginx:
    image: nginx:1.23.3
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./homepage:/var/www/html
      - ./sub:/var/www/sub
      - ./config:/etc/nginx/conf.d
      - /home/sgshami/ssl:/etc/ssl
    networks:
      - reverse-proxy
    healthcheck:
      test: curl --fail http://localhost || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    depends_on:
      - ddclient

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/drive1/ddclient/ddclient.conf:/config
    restart: unless-stopped

networks:
  reverse-proxy:
    external: true
