http {
    sendfile on;

    upstream docker-tester1 {
        server tester1:80;
    }

    upstream docker-tester2 {
        server tester2:80;
    }
    server {
        listen 80;
        server_name *.sgshami.com;
        return 301 https://sgshami.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name *.sgshami.com;
        
        ssl_certificate /etc/ssl/sgshami.com.pem;
        ssl_certificate_key /etc/ssl/sgshami.com.key;

        #access_log /var/log/nginx/data-access.log combined;

        location / {
            root /var/www/html;  
            index index.html; 
            try_files $uri $uri/ =404;
        }

        location /tester1/ {
            proxy_pass         http://docker-tester1;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location /tester2/ {
            proxy_pass         http://docker-tester2;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
    }
}