ssl_certificate /etc/ssl/sgshami.com.pem;
ssl_certificate_key /etc/ssl/sgshami.com.key;
access_log /var/log/nginx/data-access.log combined;

upstream docker-tester1 {
    server tester1:80;
}

server {
    listen 80;
    server_name *.sgshami.com;
    return 301 https://sgshami.com$request_uri;
}

server{
    listen 443 ssl;
    server_name tester1.sgshami.com;
    location / {
        proxy_pass         http://docker-tester1;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $server_name;
    }
}

server {
    listen 443 ssl;
    server_name *.sgshami.com;
    
    
    location / {
        root /var/www/html;  
        index index.html; 
        try_files $uri $uri/ =404;
    }
}