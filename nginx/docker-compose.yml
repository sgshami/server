version: '3.8'

services:
  nginx:
    image: nginx:1.23.3
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./homepage:/var/www/html
      - ./sub:/var/www/sub
      - ./config:/etc/nginx/conf.d
      - /home/sgshami/ssl:/etc/ssl
    networks:
      - reverse-proxy
    healthcheck:
      test: curl --fail http://localhost || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
  web1:
    container_name: tester1
    image: nginxdemos/hello
    networks:
      - reverse-proxy
  web2:
    container_name: tester2
    image: nginxdemos/hello
    networks:
      - reverse-proxy

networks:
  reverse-proxy:
    external: true
