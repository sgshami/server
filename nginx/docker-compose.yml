version: '3.8'
services:
  nginx:
    image: nginx:1.23.3
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - /home/sgshami/nginx/homepage:/var/www/html
      - /home/sgshami/nginx/sub:/var/www/sub
      - /home/sgshami/nginx/config:/etc/nginx/conf.d
      - /home/sgshami/nginx/ssl:/etc/ssl
    healthcheck:
      test: curl --fail http://localhost || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
