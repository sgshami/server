version: '3'
services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    network_mode: host
    #ports:
    #- 8096:8096
    volumes:
      - /mnt/sda1/Movies:/media
      - /mnt/sda1/TV Shows:/media2
      - /mnt/sda1/Config:/config
      - /mnt/sda1/Cache:/cache
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: 'unless-stopped'
