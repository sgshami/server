version: '3.5'
services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    network_mode: 'host'
    volumes:
      - /mnt/sda1/Config:/config
      - /mnt/sda1/Cache:/cache
      - /mnt/sda1/Movies:/media:ro
      - /mnt/sda1/'TV Shows':/media2:ro
    restart: 'unless-stopped'