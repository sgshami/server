version: '3.8'

services:
  mc:
    image: itzg/minecraft-server
    container_name: minecraft-java
    networks:
      - minecraft-server
    environment:
      - EULA="TRUE"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - mc-java:/data

  mc-bedrock:
    image: itzg/minecraft-bedrock-server
    container_name: minecraft-bedrock
    networks:
      - minecraft-server
    environment:
      EULA: "TRUE"
    volumes:
      - mc-bedrock:/data
    stdin_open: true
    tty: true

  backups:
    image: itzg/mc-backup
    container_name: minecraft-java-backup
    networks:
      - minecraft-server
    environment:
      BACKUP_INTERVAL: "2h"
      RCON_HOST: mc
      PRE_BACKUP_SCRIPT: |
        echo "Before backup!"
        echo "Also before backup from $$RCON_HOST to $$DEST_DIR"
      POST_BACKUP_SCRIPT_FILE: /post-backup.sh
    volumes:
      - data:/data:ro
      - ./mc-backups:/backups
      - ./post-backup.sh:/post-backup.sh:ro

  router:
    image: itzg/mc-router
    container_name: minecraft-router
    networks:
      - minecraft-server
    ports:
      - 25565:25565
      - 19132:19132/udp
    command: --mapping=mc=mc.sgshami.com=mc:25565,mcb.sgshami.com=mc-bedrock:19132

volumes:
  mc-java:
    external: true
  mc-bedrock:
    external: true

networks:
  minecraft-server:
    external: true
