version: '3.8'

services:
  mc:
    image: itzg/minecraft-server
    container_name: mc-java
    networks:
      - minecraft-server
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - mc-java:/data

  mc-bedrock:
    image: itzg/minecraft-bedrock-server
    container_name: mc-bedrock
    networks:
      - minecraft-server
    ports:
      - 19132:19132/udp
    environment:
      EULA: "TRUE"
    volumes:
      - mc-bedrock:/data
    stdin_open: true
    tty: true
    restart: unless-stopped

  #Make sure to delete backups or automate it. 
  backups:
    image: itzg/mc-backup
    container_name: mc-java-backup
    networks:
      - minecraft-server
    environment:
      BACKUP_INTERVAL: "24h"
      RCON_HOST: mc
      PRE_BACKUP_SCRIPT: |
        echo "Before backup!"
        echo "Also before backup from $$RCON_HOST to $$DEST_DIR"
      POST_BACKUP_SCRIPT_FILE: /post-backup.sh
    volumes:
      - mc-java:/data:ro
      - ./mc-backups:/backups
      - ./post-backup.sh:/post-backup.sh:ro
    restart: unless-stopped
    depends_on:
      - mc

volumes:
  mc-java:
    external: true
  mc-bedrock:
    external: true

networks:
  minecraft-server:
    external: true
